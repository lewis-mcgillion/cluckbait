<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Something went wrong — Cluckbait</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/icon.png" type="image/png">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0a;
        color: #e0e0e0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .error-container { max-width: 500px; }
      .error-icon { font-size: 5rem; margin-bottom: 1.5rem; display: block; }
      h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 2rem;
        color: #fff;
        margin-bottom: 0.5rem;
      }
      .error-code { color: #c75a20; font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; }
      p { color: #999; line-height: 1.6; margin-bottom: 1.5rem; }
      .btn {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: #c75a20;
        color: #fff;
        text-decoration: none;
        border-radius: 0.5rem;
        font-weight: 600;
        transition: background 0.2s;
      }
      .btn:hover { background: #a84a18; }
      .footer-text { margin-top: 2rem; color: #555; font-size: 0.85rem; }
      .logo { font-size: 1.25rem; color: #fff; margin-bottom: 2rem; }
      .logo-icon { margin-right: 0.25rem; }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="logo"><span class="logo-icon">🍗</span> Cluckbait</div>
      <span class="error-icon">🔥</span>
      <h1>Something went wrong!</h1>
      <div class="error-code">500 — Internal Server Error</div>
      <p>Looks like our chicken got a bit too crispy. We're working on it — please try again in a moment.</p>
      <a href="/" class="btn">Back to Home 🏠</a>
      <p class="footer-text">If this keeps happening, our team has been notified.</p>
    </div>
  </body>
</html>
