# PostgreSQL configuration
#   gem install pg
#
#   Ensure the pg gem is defined in your Gemfile
#   gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: cluckbait_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: cluckbait_test

# In production, DATABASE_URL takes precedence when set.
# For Kamal deployments, the database runs as an accessory container
# accessible via the Docker network at host "cluckbait-db".
production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    host: <%= ENV.fetch("DB_HOST", "localhost") %>
    database: cluckbait_production
    username: cluckbait
    password: <%= ENV["POSTGRES_PASSWORD"] %>
  cache:
    <<: *default
    url: <%= ENV["CACHE_DATABASE_URL"] %>
    host: <%= ENV.fetch("DB_HOST", "localhost") %>
    database: cluckbait_production_cache
    username: cluckbait
    password: <%= ENV["POSTGRES_PASSWORD"] %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    url: <%= ENV["QUEUE_DATABASE_URL"] %>
    host: <%= ENV.fetch("DB_HOST", "localhost") %>
    database: cluckbait_production_queue
    username: cluckbait
    password: <%= ENV["POSTGRES_PASSWORD"] %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    url: <%= ENV["CABLE_DATABASE_URL"] %>
    host: <%= ENV.fetch("DB_HOST", "localhost") %>
    database: cluckbait_production_cable
    username: cluckbait
    password: <%= ENV["POSTGRES_PASSWORD"] %>
    migrations_paths: db/cable_migrate
